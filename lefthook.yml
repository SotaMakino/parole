# Pre-commit mirrors the web CI job: lint (format check + rescript build),
# unit tests, then the production build. Scoped to web/ so they only run when
# web files are staged, and kept sequential to avoid ReScript build-lock
# contention between the steps.
pre-commit:
  commands:
    lint:
      root: "web/"
      run: bun run lint
    test:
      root: "web/"
      run: bun run test
    build:
      root: "web/"
      run: bun run build
